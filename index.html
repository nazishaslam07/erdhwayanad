  <body>
    <!-- Visible shell immediately -->
    <div id="root">
      <div class="loading-shell">
        <div class="loading-spinner"></div>
        <p class="loading-text">Loading erdh...</p>
        <div class="loading-text meta">If this takes too long, try refreshing the page</div>
        <div class="connection-status">
          <span id="connection-info"></span>
        </div>
      </div>
    </div>

    <!-- Inline connection monitoring script (runs immediately) -->
    <script>
      // Run immediately before any other scripts
      (function monitorConnection() {
        const infoEl = document.getElementById('connection-info');
        const html = document.documentElement;
        
        function updateStatus(msg) {
          if (infoEl) infoEl.textContent = msg;
          console.log('[erdh] ' + msg);
        }

        // Detect connection quality
        function detectConnection() {
          const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
          if (!conn) return 'unknown';
          
          const type = conn.effectiveType;
          const rtt = conn.rtt;
          const saveData = conn.saveData;
          
          if (saveData) return 'slow (data saver)';
          if (type === '4g' && rtt < 50) return 'fast (4g)';
          if (type === '3g' || type === '2g' || rtt > 150) return 'slow (3g/2g)';
          if (type === '4g') return 'fast (4g)';
          return 'unknown';
        }

        const quality = detectConnection();
        html.setAttribute('data-connection', quality.includes('slow') ? 'slow' : 'fast');
        updateStatus('Connection: ' + quality);

        // Monitor connection changes
        const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
        if (conn) {
          conn.addEventListener('change', function() {
            const newQuality = detectConnection();
            updateStatus('Connection changed: ' + newQuality);
          });
        }

        // Track script loading
        const scripts = document.querySelectorAll('script[data-module]');
        let loadedCount = 0;
        scripts.forEach(s => {
          s.addEventListener('load', () => {
            loadedCount++;
            updateStatus('Loaded module ' + loadedCount + '/' + scripts.length);
          });
          s.addEventListener('error', () => {
            updateStatus('⚠️ Failed to load module');
          });
        });

        // Timeout checker
        setTimeout(() => {
          const root = document.getElementById('root');
          if (root && root.querySelector('.loading-shell')) {
            updateStatus('⚠️ Taking longer than expected. Page may load any moment.');
          }
        }, 10000);
      })();
    </script>

    <!-- Main app script with keepalive and error handling -->
    <script type="module" src="/src/main.tsx" data-module></script>
  </body>
